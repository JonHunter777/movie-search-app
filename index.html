<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Search</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header class="header">
      <h1 class="logo">🎬 MovieSearch</h1>
      <div class="search-box">
        <input
          class="search-input"
          type="text"
          placeholder="Найти фильм..."
        />
        <button class="search-btn">Найти</button>
      </div>
      <button class="fav-tab-btn" id="fav-tab-btn">❤️ Избранное</button>
    </header>

    <main class="main">
      <div id="movies-grid" class="movies-grid">

        <div class="movie-card">
          <img class="movie-poster" src="https://placehold.co/300x450" alt="Poster" />
          <div class="movie-info">
            <h2 class="movie-title">Название фильма</h2>
            <p class="movie-year">2024</p>
            <p class="movie-rating">⭐ 8.5</p>
          </div>
        </div>

        <div class="movie-card">
          <img class="movie-poster" src="https://placehold.co/300x450" alt="Poster" />
          <div class="movie-info">
            <h2 class="movie-title">Название фильма</h2>
            <p class="movie-year">2024</p>
            <p class="movie-rating">⭐ 8.5</p>
          </div>
        </div>

        <div class="movie-card">
          <img class="movie-poster" src="https://placehold.co/300x450" alt="Poster" />
          <div class="movie-info">
            <h2 class="movie-title">Название фильма</h2>
            <p class="movie-year">2024</p>
            <p class="movie-rating">⭐ 8.5</p>
          </div>
        </div>

        <div class="movie-card">
          <img class="movie-poster" src="https://placehold.co/300x450" alt="Poster" />
          <div class="movie-info">
            <h2 class="movie-title">Название фильма</h2>
            <p class="movie-year">2024</p>
            <p class="movie-rating">⭐ 8.5</p>
          </div>
        </div>

      </div>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <button class="modal-close" id="modal-close">✕</button>
            <div class="modal-content">
            <img class="modal-poster" id="modal-poster" src="" alt="" />
            <div class="modal-info">
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-year" id="modal-year"></p>
                <p class="modal-rating" id="modal-rating"></p>
                <p class="modal-overview" id="modal-overview"></p>
                <button class="modal-fav-btn" id="modal-fav-btn">❤️ В избранное</button>
            </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
