<!DOCTYPE html>
<html lang="ru">
  <head>

    <title>Movie Search</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <header class="header">
      <h1 class="logo">🎬 MovieSearch</h1>

    </main>

    <script src="js/api.js"></script>

</html>
